name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, test, and package
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore .\RawBufferVisualizer.sln

      - name: Build
        run: dotnet build .\RawBufferVisualizer.sln --configuration Release --no-restore

      - name: Self-test
        run: dotnet run --project .\tests\RawBufferVisualizer.Tests\RawBufferVisualizer.Tests.csproj --configuration Release --framework net9.0-windows

      - name: Publish package
        run: powershell -ExecutionPolicy Bypass -File .\scripts\Publish-Windows.ps1

      - name: Publish Visual Studio extension prototype
        run: powershell -ExecutionPolicy Bypass -File .\scripts\Publish-VisualStudioExtension.ps1

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          path: artifacts\publish\RawBufferVisualizer-net9.0-windows-win-x64-sc.zip
          if-no-files-found: error
          archive: false

      - name: Upload Visual Studio extension prototype
        uses: actions/upload-artifact@v7
        with:
          path: artifacts\publish\RawBufferVisualizer-VisualStudioExtensibility-net8.0-windows.zip
          if-no-files-found: error
          archive: false
